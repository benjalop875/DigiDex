<header class="flex justify-between items-center w-full px-4 md:px-8 h-16 sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-cyan-500/20 shadow-sm md:shadow-[0_1px_15px_var(--glow-color)]">
  <div class="flex items-center gap-6">
    <span class="text-lg md:text-xl font-black tracking-tighter text-cyan-500 drop-shadow-[0_0_10px_var(--glow-color)] uppercase truncate">DIGI_DEX_SYSTEM</span>
    <nav class="hidden md:flex gap-4 font-['Space_Grotesk'] tracking-widest uppercase text-xs">
      <a routerLink="/explorer" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:drop-shadow-[0_0_5px_var(--glow-color)]" class="text-slate-400 hover:text-cyan-300 transition-all duration-300">Explorer</a>
      <a routerLink="/skills" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:drop-shadow-[0_0_5px_var(--glow-color)]" class="text-slate-400 hover:text-cyan-300 transition-all duration-300">Skills</a>
      <a routerLink="/types" routerLinkActive="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:drop-shadow-[0_0_5px_var(--glow-color)]" class="text-slate-400 hover:text-cyan-300 transition-all duration-300 hover:drop-shadow-[0_0_5px_var(--glow-color)]">Types</a>
    </nav>
  </div>
  <div class="flex items-center gap-4">
    <button (click)="toggleTheme()" aria-label="Toggle Theme" class="glass-panel px-3 md:px-4 py-1.5 text-xs font-bold tracking-wider text-cyan-400 hover:bg-cyan-500/10 transition-colors flex items-center justify-center gap-2 rounded-full min-w-margin-page md:min-w-auto">
      <span class="material-symbols-outlined text-[16px]">light_mode</span>
      <span class="hidden sm:inline">TOGGLE THEME</span>
    </button>
  </div>
</header>
